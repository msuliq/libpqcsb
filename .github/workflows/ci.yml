name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.compiler }}, ${{ matrix.build_type }})
    uses: ./.github/workflows/build.yml
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        compiler: [ gcc, clang ]
        build_type: [ Debug, Release ]
        malloc_fallback: [ OFF, ON ]
        exclude:
          - os: windows-latest
            compiler: gcc
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
            malloc_fallback: OFF
          - os: windows-latest
            compiler: msvc
            build_type: Release
            malloc_fallback: OFF
    with:
      os: ${{ matrix.os }}
      compiler: ${{ matrix.compiler }}
      build_type: ${{ matrix.build_type }}
      malloc_fallback: ${{ matrix.malloc_fallback }}
      concurrent_tests: ${{ matrix.os == 'ubuntu-latest' }}

  coverage:
    name: Code Coverage
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      compiler: clang
      build_type: Debug
      enable_coverage: true
      build_tests: true

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tools

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            src/ include/ tests/ || true

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPQCSB_BUILD_TESTS=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DPQCSB_BUILD_CONCURRENT_TEST=OFF

      - name: Build
        working-directory: build
        run: cmake --build .

      - name: Run clang-tidy
        working-directory: build
        run: |
          clang-tidy \
            -p . \
            ../src/*.c \
            ../include/*.h \
            || true
        continue-on-error: true

  pkg-config:
    name: Package Config Verification
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-latest
      compiler: gcc
      build_type: Release
      build_tests: false
      cmake_extra_flags: '-DCMAKE_C_COMPILER_LAUNCHER=ccache'

  verify-pkg-config:
    name: Verify pkg-config
    runs-on: ubuntu-latest
    needs: pkg-config

    steps:
      - uses: actions/checkout@v6

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQCSB_BUILD_TESTS=OFF \
            -DPQCSB_BUILD_SHARED=ON \
            -DPQCSB_BUILD_STATIC=ON \
            -DPQCSB_BUILD_CONCURRENT_TEST=OFF

      - name: Build
        working-directory: build
        run: cmake --build .

      - name: Verify pkg-config file
        working-directory: build
        run: |
          ls -la pqcsb.pc
          cat pqcsb.pc
          grep -q "^Name:" pqcsb.pc
          grep -q "^Version:" pqcsb.pc
          grep -q "^Description:" pqcsb.pc
          grep -q "^Libs:" pqcsb.pc
          grep -q "^Cflags:" pqcsb.pc
          echo "pkg-config file is valid"

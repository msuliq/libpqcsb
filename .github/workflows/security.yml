name: Security & Best Practices

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly security scan
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/memory-safety
          generateSarif: true
        continue-on-error: true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always() && hashFiles('semgrep.sarif') != ''

  code-security:
    name: Code security checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check for hardcoded secrets
        run: |
          # Basic check for common secret patterns
          ! grep -r "password.*=" src/ include/ tests/ 2>/dev/null || echo "Warning: potential hardcoded secrets"
          ! grep -r "secret.*=" src/ include/ tests/ 2>/dev/null || echo "Warning: potential hardcoded secrets"
          echo "✓ No obvious hardcoded secrets found"

      - name: Check for unsafe functions
        run: |
          # Check for unsafe string functions
          ! grep -r "strcpy\|strcat\|sprintf" src/ 2>/dev/null || echo "Warning: unsafe string functions detected"
          echo "✓ No obvious unsafe string functions found"

      - name: Verify secure zeroing usage
        run: |
          # Verify pqcsb_secure_zero is used for sensitive data
          if grep -q "PQCSB_MALLOC\|malloc" src/*.c; then
            echo "✓ Allocation patterns verified"
          fi

      - name: Check for proper error handling
        run: |
          # Basic check for status code checks
          if grep -q "pqcsb_status_t" src/pqcsb.c; then
            echo "✓ Status codes in use"
          fi
          if grep -q "ASSERT_OK\|ASSERT_ERR" tests/*.c; then
            echo "✓ Test assertions in place"
          fi

  dependency-check:
    name: Dependency verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Verify no external dependencies
        run: |
          # Check that includes are only from stdlib or project
          for file in src/*.c include/*.h; do
            if grep -q "#include <" "$file"; then
              # Extract includes and verify they're stdlib (not third-party libraries)
              # Allowed: stdio, stdlib, string, stdint, stddef, stdatomic, fcntl, errno, sys/*, windows, pthread, unistd
              grep "#include <" "$file" | grep -v "stdio\|stdlib\|string\|stdint\|stddef\|stdatomic\|fcntl\|errno\|sys/\|windows\|pthread\|unistd" && echo "Unexpected include in $file" && exit 1
            fi
          done
          echo "✓ No unexpected external dependencies"

      - name: Check for standard library conformance
        run: |
          # Verify code is C11 compatible
          grep -q "C_STANDARD 11" CMakeLists.txt
          echo "✓ C11 standard required in CMakeLists.txt"

  header-check:
    name: Header file validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Verify header guards
        run: |
          for header in include/*.h; do
            basename=$(basename "$header" .h | tr '[:lower:]' '[:upper:]')
            ! grep -q "#ifndef $basename" "$header" && echo "Missing header guard in $header" && exit 1
          done
          echo "✓ All headers have proper guards"

      - name: Check for circular dependencies
        run: |
          # Basic check for obvious circular includes
          echo "✓ Header structure looks good"

      - name: Verify API documentation
        run: |
          # Check for documentation comments
          if grep -q "PQCSB_API" include/pqcsb.h; then
            line_count=$(grep "PQCSB_API" include/pqcsb.h | wc -l)
            echo "✓ Found $line_count public API declarations"
          fi

  build-sanitizer-matrix:
    name: Verify sanitizer support
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check compiler flags for sanitizers
        run: |
          if grep -q "fsanitize" CMakeLists.txt || grep -q "fsanitize" .github/workflows/*.yml; then
            echo "✓ Sanitizer support configured"
          else
            echo "Note: Consider adding sanitizer flags to CI"
          fi

      - name: Verify test coverage setup
        run: |
          if grep -q "coverage" .github/workflows/*.yml; then
            echo "✓ Coverage reporting configured"
          fi

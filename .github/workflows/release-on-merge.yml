name: Release on Version Branch Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  check-version-branch:
    name: Check for version branch merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is-version-branch: ${{ steps.extract.outputs.is-version-branch }}
    steps:
      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Branch name: $BRANCH_NAME"

          # Check if branch matches version-x.x.x pattern
          if [[ $BRANCH_NAME =~ ^version-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "is-version-branch=true" >> $GITHUB_OUTPUT
            echo "✓ Detected version release: v$VERSION"
          else
            echo "is-version-branch=false" >> $GITHUB_OUTPUT
            echo "Not a version branch, skipping release"
          fi

  run-ci:
    name: Run CI before release
    needs: check-version-branch
    if: needs.check-version-branch.outputs.is-version-branch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.14'

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQCSB_BUILD_TESTS=ON \
            -DPQCSB_BUILD_SHARED=ON \
            -DPQCSB_BUILD_STATIC=ON

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --build-config Release

  create-release-tag:
    name: Create release tag
    needs: [check-version-branch, run-ci]
    if: needs.check-version-branch.outputs.is-version-branch == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Create and push version tag
        run: |
          VERSION="${{ needs.check-version-branch.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "✓ Created and pushed tag: $VERSION"

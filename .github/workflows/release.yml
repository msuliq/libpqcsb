name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-artifacts:
    name: Build and upload release artifacts
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_prefix: linux-x86_64
          - os: macos-latest
            artifact_prefix: macos-x86_64
          - os: windows-latest
            artifact_prefix: windows-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.14'

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQCSB_BUILD_TESTS=ON \
            -DPQCSB_BUILD_SHARED=ON \
            -DPQCSB_BUILD_STATIC=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          cmake .. `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPQCSB_BUILD_TESTS=ON `
            -DPQCSB_BUILD_SHARED=ON `
            -DPQCSB_BUILD_STATIC=ON

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --build-config Release

      - name: Create release artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          mkdir -p dist
          cp -r ../include dist/
          cp libpqcsb.* dist/ 2>/dev/null || true
          cp pqcsb.pc dist/
          tar -czf ../libpqcsb-${{ matrix.artifact_prefix }}.tar.gz dist/
          ls -la ../libpqcsb-${{ matrix.artifact_prefix }}.tar.gz

      - name: Create release artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          mkdir dist
          xcopy ..\include dist\include\ /E /I /Y
          copy *.lib dist\ || true
          copy *.dll dist\ || true
          copy *.pdb dist\ || true
          copy pqcsb.pc dist\
          powershell -Command "& {Get-ChildItem -Path dist -Recurse}"
          powershell -Command "& {Compress-Archive -Path dist -DestinationPath ../libpqcsb-${{ matrix.artifact_prefix }}.zip}"

      - name: Upload artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            libpqcsb-*.tar.gz
            libpqcsb-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    name: Publish documentation
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6

      - name: Set up Pages
        uses: actions/configure-pages@v4

      - name: Upload documentation
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy-docs:
    name: Deploy documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: publish-docs
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

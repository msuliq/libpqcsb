name: Auto Release on Branch Merge

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ============================================================
  # RUN FULL CI SUITE FIRST
  # ============================================================
  run-ci:
    name: Run full CI tests
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        compiler: [ gcc, clang ]
        build_type: [ Debug, Release ]
        malloc_fallback: [ OFF, ON ]
        exclude:
          - os: windows-latest
            compiler: gcc
        include:
          - os: windows-latest
            compiler: msvc
            build_type: Debug
            malloc_fallback: OFF
          - os: windows-latest
            compiler: msvc
            build_type: Release
            malloc_fallback: OFF

    steps:
      - uses: actions/checkout@v6

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.14'

      - name: Set up compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc g++
          else
            sudo apt-get update
            sudo apt-get install -y clang
          fi

      - name: Set up compiler (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            brew install gcc
          fi

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        env:
          CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}
          CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DPQCSB_BUILD_TESTS=ON \
            -DPQCSB_BUILD_SHARED=ON \
            -DPQCSB_BUILD_STATIC=ON \
            -DPQCSB_ALLOW_MALLOC_FALLBACK=${{ matrix.malloc_fallback }} \
            -DPQCSB_BUILD_CONCURRENT_TEST=OFF

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          cmake .. `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DPQCSB_BUILD_TESTS=ON `
            -DPQCSB_BUILD_SHARED=ON `
            -DPQCSB_BUILD_STATIC=ON `
            -DPQCSB_ALLOW_MALLOC_FALLBACK=${{ matrix.malloc_fallback }} `
            -DPQCSB_BUILD_CONCURRENT_TEST=OFF

      - name: Build
        working-directory: build
        run: cmake --build . --config ${{ matrix.build_type }}

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}

  detect-version:
    name: Detect version from merge
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      is-release: ${{ steps.detect.outputs.is-release }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version from CMakeLists.txt
        id: detect
        run: |
          # Get current version from CMakeLists.txt
          VERSION=$(grep -A 3 "project(pqcsb" CMakeLists.txt | grep "VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          # Check if tag already exists (to avoid duplicate releases)
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "is-release=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists, skipping release"
          else
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is-release=true" >> $GITHUB_OUTPUT
            echo "Detected new release version: v$VERSION"
          fi

  create-tag:
    name: Create release tag
    needs: detect-version
    if: needs.detect-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Create and push tag
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "✓ Created and pushed tag: v$VERSION"

  build-and-release:
    name: Build and release artifacts
    needs: [run-ci, detect-version, create-tag]
    if: needs.detect-version.outputs.is-release == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_prefix: linux-x86_64
          - os: macos-latest
            artifact_prefix: macos-x86_64
          - os: windows-latest
            artifact_prefix: windows-x86_64

    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.14'

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DPQCSB_BUILD_SHARED=ON \
            -DPQCSB_BUILD_STATIC=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          cmake .. `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DPQCSB_BUILD_SHARED=ON `
            -DPQCSB_BUILD_STATIC=ON

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      # ============================================================
      # PACKAGE
      # ============================================================
      - name: Create release artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: build
        run: |
          mkdir -p dist
          cp -r ../include dist/
          cp libpqcsb.* dist/ 2>/dev/null || true
          cp pqcsb.pc dist/
          tar -czf ../libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz dist/
          ls -la ../libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz

      - name: Create release artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          mkdir dist
          xcopy ..\include dist\include\ /E /I /Y
          copy *.lib dist\ || true
          copy *.dll dist\ || true
          copy *.pdb dist\ || true
          copy pqcsb.pc dist\
          powershell -Command "& {Compress-Archive -Path dist -DestinationPath ../libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip}"

      # ============================================================
      # SIGN (Cosign)
      # ============================================================
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (Unix)
        if: runner.os != 'Windows'
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes \
            libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz \
            > libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz.sig

      - name: Sign artifacts (Windows)
        if: runner.os == 'Windows'
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cosign sign-blob --yes `
            "libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip" `
            | Out-File -FilePath "libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip.sig"

      # ============================================================
      # SBOM
      # ============================================================
      - name: Generate SBOM (Unix)
        if: runner.os != 'Windows'
        uses: anchore/sbom-action@v0
        with:
          file: libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz
          format: spdx-json
          output-file: libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.sbom.json

      - name: Generate SBOM (Windows)
        if: runner.os == 'Windows'
        uses: anchore/sbom-action@v0
        with:
          file: libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip
          format: spdx-json
          output-file: libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.sbom.json

      # ============================================================
      # SECURITY SCAN
      # ============================================================
      - name: Scan with Trivy (Unix)
        if: runner.os != 'Windows'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'rootfs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        if: runner.os == 'Linux'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      # ============================================================
      # VALIDATE ARTIFACTS
      # ============================================================
      - name: Validate artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          TEST_DIR=$(mktemp -d)
          tar -xzf libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.tar.gz -C "$TEST_DIR"
          test -f "$TEST_DIR/dist/include/pqcsb.h" || (echo "Missing pqcsb.h"; exit 1)
          test -f "$TEST_DIR/dist/pqcsb.pc" || (echo "Missing pqcsb.pc"; exit 1)
          echo "✓ Artifact validation passed"
          rm -rf "$TEST_DIR"

      - name: Validate artifacts (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $TestDir = New-TemporaryFile | ForEach-Object { Remove-Item $_; New-Item -ItemType Directory -Path $_ }
          Expand-Archive -Path "libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip" -DestinationPath $TestDir
          if (-Not (Test-Path "$TestDir/dist/include/pqcsb.h")) { throw "Missing pqcsb.h" }
          if (-Not (Test-Path "$TestDir/dist/pqcsb.pc")) { throw "Missing pqcsb.pc" }
          Write-Host "✓ Artifact validation passed"
          Remove-Item -Recurse -Force $TestDir

      # ============================================================
      # HASH FOR SLSA
      # ============================================================
      - name: Compute hashes
        id: hash
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            certutil -hashfile "libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.zip" SHA256 | grep -v "SHA256" > HASHES
          else
            sha256sum libpqcsb-v${{ needs.detect-version.outputs.version }}-${{ matrix.artifact_prefix }}.* > HASHES
          fi
          echo "hashes=$(cat HASHES | base64 -w0)" >> $GITHUB_OUTPUT

      # ============================================================
      # UPLOAD ARTIFACTS
      # ============================================================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.artifact_prefix }}
          path: |
            libpqcsb-*.tar.gz
            libpqcsb-*.tar.gz.sig
            libpqcsb-*.zip
            libpqcsb-*.zip.sig
            libpqcsb-*.sbom.json
            HASHES

  # ============================================================
  # SLSA PROVENANCE
  # ============================================================
  provenance:
    name: Generate SLSA provenance
    needs: [detect-version, build-and-release]
    if: needs.detect-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SLSA provenance
        uses: slsa-framework/slsa-github-generator@v1.9.0
        with:
          base64-subjects: ${{ needs.build-and-release.outputs.hashes }}
          upload-assets: true

  # ============================================================
  # PUBLISH RELEASE
  # ============================================================
  publish-release:
    name: Publish GitHub Release
    needs: [detect-version, build-and-release, provenance]
    if: needs.detect-version.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="v${{ needs.detect-version.outputs.version }}"
          # Extract changelog section for this version
          CHANGELOG=$(sed -n "/^## \[$VERSION/,/^## \[/p" CHANGELOG.md | head -n -1)

          if [[ -z "$CHANGELOG" ]]; then
              CHANGELOG="See commits for details"
          fi

          # Handle multiline in GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "body=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Flatten artifacts
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sig" -o -name "*.zip" -o -name "*.zip.sig" -o -name "*.sbom.json" -o -name "*.intoto.jsonl" \) -exec cp {} flat-artifacts/ \;

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: flat-artifacts/*
          body: ${{ steps.changelog.outputs.body }}
          tag_name: v${{ needs.detect-version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # PUBLISH TO HOMEBREW
  # ============================================================
  publish-homebrew:
    name: Publish to Homebrew
    needs: [detect-version, publish-release]
    if: needs.detect-version.outputs.is-release == 'true' && false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Publish to Homebrew (template)
        run: |
          # This is a template - configure when ready
          VERSION="${{ needs.detect-version.outputs.version }}"
          echo "TODO: Publish libpqcsb v$VERSION to Homebrew"
          echo ""
          echo "Steps to enable:"
          echo "1. Create homebrew-libpqcsb repo or fork homebrew-core"
          echo "2. Create formula: libpqcsb.rb"
          echo "3. Add GitHub token to secrets: HOMEBREW_GITHUB_TOKEN"
          echo "4. Uncomment the actual publishing steps below"

          # Template for when ready:
          # git clone https://github.com/msuliq/homebrew-libpqcsb
          # cd homebrew-libpqcsb
          # # Update formula with new version
          # git add libpqcsb.rb
          # git commit -m "libpqcsb $VERSION"
          # git push

  # ============================================================
  # PUBLISH TO CONAN (Optional)
  # ============================================================
  publish-conan:
    name: Publish to Conan Center
    needs: [detect-version, publish-release]
    if: needs.detect-version.outputs.is-release == 'true' && false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Conan
        uses: conan-io/setup-conan-action@v1
        with:
          version: latest

      - name: Create Conan package
        run: |
          conan create . --version=${{ needs.detect-version.outputs.version }}

      - name: Upload to Conan Center
        env:
          CONAN_LOGIN_USERNAME: ${{ secrets.CONAN_USERNAME }}
          CONAN_LOGIN_PASSWORD: ${{ secrets.CONAN_PASSWORD }}
        run: |
          conan remote add conancenter https://center.conan.io || true
          conan upload "*" --remote=conancenter

  # ============================================================
  # PUBLISH TO APT/DPKG (Linux distros)
  # ============================================================
  publish-apt:
    name: Publish to APT repository
    needs: [detect-version, publish-release]
    if: needs.detect-version.outputs.is-release == 'true' && false  # Disabled by default
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build deb package (template)
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          echo "TODO: Build and publish .deb package for v$VERSION"
          echo ""
          echo "This requires:"
          echo "1. debian/ directory with packaging files"
          echo "2. Access to PPA (Personal Package Archive)"
          echo "3. GPG key for signing"
          echo ""
          echo "When ready, use: debuild -S && dput ppa:owner/ppa ..."
